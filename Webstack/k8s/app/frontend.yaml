apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: project-webstack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-container
        image: bl-frontend:v2
        imagePullPolicy: Never
        stdin: true
        tty: true
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: project-webstack
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080 # We gebruiken een NodePort zodat de VM erbij kan
  type: NodePort