apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: project-webstack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api-container
        image: bl-api:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: WEBSTACK_DB_HOST
          value: "mariadb-service"
        - name: WEBSTACK_DB_NAME
          value: "bl_db"
        - name: WEBSTACK_DB_USER
          valueFrom:
            secretKeyRef:
              name: mariadb-secrets
              key: mariadb-user
        - name: WEBSTACK_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-secrets
              key: mariadb-password
        - name: CORS_ORIGINS
          value: "*" # Voor nu even alles toestaan om errors te voorkomen
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: project-webstack
spec:
  selector:
    app: api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
