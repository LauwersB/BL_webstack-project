apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webstack-ingress
  namespace: project-webstack
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - web.bl-webstack.duckdns.org
    secretName: web-tls
  rules:
  - host: web.bl-webstack.duckdns.org
    http:
      paths:
      - path: /api(/|$)(.*)    # API regel MOET bovenaan staan
        pathType: ImplementationSpecific
        backend:
          service:
            name: api-service
            port:
              number: 8000
      - path: /()(.*)          # Frontend vangt de rest op
        pathType: ImplementationSpecific
        backend:
          service:
            name: frontend-service
            port:
              number: 80