apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: project-webstack
spec:
  replicas: 2
  strategy: 
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-container
        image: lauwersb/bl-frontend:1561fc7281e42c2efe368be1fa496b7849d56880
        imagePullPolicy: Always
        stdin: true
        tty: true
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: project-webstack
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080 # NodePort voor even te testen zonder ingress
  type: NodePort