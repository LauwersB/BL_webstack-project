apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: project-webstack
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api-container
        image: lauwersb/bl-api:1561fc7281e42c2efe368be1fa496b7849d56880
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /health  
            port: 8000
          initialDelaySeconds: 15 
          periodSeconds: 10    
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        ports:
        - containerPort: 8000
        env:
        - name: WEBSTACK_DB_HOST
          value: "mariadb-service"
        - name: WEBSTACK_DB_NAME
          value: "bl_db"
        - name: WEBSTACK_DB_USER
          valueFrom:
            secretKeyRef:
              name: mariadb-secrets
              key: mariadb-user
        - name: WEBSTACK_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-secrets
              key: mariadb-password
        - name: CORS_ORIGINS
          value: "*" # Voor nu even alles toestaan om errors te voorkomen
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: project-webstack
  labels:
    app: api-service  
spec:
  selector:
    app: api
  ports:
    - name: http      
      protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
