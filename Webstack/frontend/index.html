<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <title>Milestone 2 - BL</title>
  </head>
  <body>
    <h1><span id="user">Loading...</span> has reached milestone 2!</h1>
    <p>Connected to API Container: <span id="container-id">Searching...</span></p>
    <div class="update-container">
      <input type="text" id="newName" placeholder="Voer nieuwe naam in">
      <button onclick="sendUpdate()">Naam Bijwerken</button>
    </div>
    <div><p>jeroen, je moet wel antwoorden he!</p></div>

    <script>
      const userElement = document.getElementById("user");
      const containerElement = document.getElementById("container-id");

      // We maken één herbruikbare functie
      function updatePage() {
        fetch("/api/user")
          .then((res) => {
            if (!res.ok) throw new Error("API not reachable");
            return res.json();
          })
          .then((data) => {
            // Update de naam
            userElement.innerText = data.name || "User not found";
            // Update het container ID (voor je opdrachtpunten!)
            containerElement.innerText = data.container_id || "Unknown";
          })
          .catch((err) => {
            console.error("Fetch error:", err);
            userElement.innerText = "Error loading data";
          });
      }

      function sendUpdate() {
        const nameInput = document.getElementById('newName').value;
        
        fetch("/api/user/update", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: nameInput })
        })
        .then(res => res.json())
        .then(data => {
          if (data.status === "success") {
            alert("Naam succesvol gewijzigd naar: " + data.updated_to);
            location.reload(); // De automatische refresh na wijziging
          } else {
            alert("Fout: " + data.error);
          }
        });
  }

      // Voer direct uit bij laden
      updatePage();

      // Check elke 5 seconden voor de "automatische" verandering
      setInterval(updatePage, 5000);
    </script>
  </body>
</html>
