server.modules = (
    "mod_access",
    "mod_alias",
    "mod_compress",
    "mod_redirect"
)

server.document-root        = "/var/www/localhost/htdocs"
server.port                 = 80
index-file.names            = ( "index.html" )


mimetype.assign = (
  ".html" => "text/html",
  ".css"  => "text/css",
  ".js"   => "text/javascript"
)