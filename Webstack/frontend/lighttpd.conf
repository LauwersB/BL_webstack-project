server.modules = (
    "mod_access",
    "mod_alias",
    "mod_proxy",
    "mod_compress",
    "mod_redirect",
)

server.document-root        = "/var/www/localhost/htdocs"
server.port                 = 80
index-file.names            = ( "index.html" )

# Proxy instellingen: Stuur /api verzoeken door naar de Kubernetes service
proxy.server = ( "/api" =>
    ((
        "host" => "api-service",
        "port" => 8000
    ))
)

# MIME types (belangrijk voor CSS)
mimetype.assign = (
  ".html" => "text/html",
  ".css"  => "text/css",
  ".js"   => "text/javascript"
)