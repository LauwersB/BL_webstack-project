name: build image

permissions:
  id-token: write
  contents: write

on:
  push:
    branches: [ main ]

jobs:
  build_api:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code into runner
        uses: actions/checkout@v4

      - name: Build the Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/bl-api:${{ github.sha }} ./Webstack/api/

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Push the image to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/bl-api:${{ github.sha }}

  build_frontend:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    needs: build_api
    steps:
      - name: Checkout repository code into runner
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Build the Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/bl-frontend:${{ github.sha }} ./Webstack/frontend/

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Push the image to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/bl-frontend:${{ github.sha }}

      - name: Update Kubernetes manifest
        run: |
          # Update image tags op basis van de huidige commit SHA
          sed -i -E "s|(^[[:space:]]*image:[[:space:]]*.+/bl-api:).*|\\1${{ github.sha }}|" Webstack/k8s/base/api.yaml
          sed -i -E "s|(^[[:space:]]*image:[[:space:]]*.+/bl-frontend:).*|\\1${{ github.sha }}|" Webstack/k8s/base/frontend.yaml
          
          # Controleer of er daadwerkelijk wijzigingen zijn
          if [[ -n $(git status --porcelain) ]]; then
            git config --global user.name "GitHub Action"
            git config --global user.email "action@github.com"
            git add Webstack/k8s/base/api.yaml Webstack/k8s/base/frontend.yaml
            git commit -m "Update images to version ${{ github.sha }}"
            git push origin HEAD:main
          else
            echo "Geen wijzigingen in de manifest-bestanden, overslaan van commit/push."
          fi